{% extends 'planner/base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-white">
                    <h3 class="mb-0">
                        <i class="fas fa-chart-line me-2" style="color: #6366f1;"></i>
                        Record Your Study Progress
                    </h3>
                </div>
                <div class="card-body">
                    {% if subjects %}
                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="mb-4">
                                <label class="form-label">Select Subject *</label>
                                <select class="form-select" name="subject_id" required>
                                    <option value="">Choose a subject...</option>
                                    {% for subject in subjects %}
                                        <option value="{{ subject.id }}">
                                            {{ subject.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Hours Studied Today *</label>
                                <input type="number" step="0.5" class="form-control" name="hours_studied" required min="0.5" max="12" value="1">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Confidence Level *</label>
                                <input type="range" class="form-range" name="confidence_level" min="0" max="100" value="50" step="5" id="confidence">
                                <div class="d-flex justify-content-between">
                                    <span>😰 Low</span>
                                    <span>😐 Medium</span>
                                    <span>😎 High</span>
                                </div>
                                <div id="confidenceValue" class="text-center mt-2 fw-bold">50%</div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Quiz/Practice Score (%) *</label>
                                <input type="number" class="form-control" name="quiz_score" required min="0" max="100" value="70">
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="{% url "dashboard" %}" class="btn btn-secondary me-md-2">Cancel</a>
                                <button type="submit" class="btn btn-gradient">Save Progress</button>
                            </div>
                        </form>
                    {% else %}
                        <div class="text-center py-5">
                            <i class="fas fa-book-open fa-4x mb-3 text-muted"></i>
                            <h4>No subjects found</h4>
                            <a href="{% url "add_subject" %}" class="btn btn-gradient mt-3">Add Your First Subject</a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const slider = document.getElementById('confidence');
    const value = document.getElementById('confidenceValue');
    
    slider.addEventListener('input', function() {
        value.textContent = this.value + '%';
    });
</script>
{% endblock %}
